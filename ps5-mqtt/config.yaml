version: "dev"
slug: ps5_mqtt_dev
name: PS5 MQTT (Dev Build)
description: Local development build of the PS5 MQTT add-on
url: https://github.com/horotat/ps5-mqtt
arch:
  - armhf
  - armv7
  - aarch64
  - amd64
  - i386
startup: application
services:
  - "mqtt:need"
boot: auto
host_network: true
ingress: true
ingress_port: 0
panel_icon: 'mdi:sony-playstation'
ports:
  8645/tcp: null
ports_description:
  8645/tcp: PS5 MQTT Web Interface
map:
  - "config:rw"
options:
  mqtt: {}
  logger: "@ha:ps5:*"
  device_check_interval: 5000
  device_discovery_interval: 60000
  account_check_interval: 5000
  include_ps4_devices: false
  psn_accounts: []
schema:
  mqtt:
    host: str?
    port: port?
    user: str?
    pass: str?
    discovery_topic: str?
  psn_accounts:
    - username: str?
      npsso: str
      preferred_ps5: str?
      preferred_ps4: str?
  logger: str?
  device_discovery_broadcast_address: str?
  device_discovery_broadcast_addresses:
    - str?
  device_hosts:
    - host: str
      name: str?
  device_check_interval: int
  device_discovery_interval: int
  account_check_interval: int
  include_ps4_devices: bool
stdin: true
